server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Basic auth — protegge tutta la dashboard
    auth_basic "AlgerON Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
